<!-- TRENDS PAGE -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Visual Trends — Olive Edge</title>
<link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div id="nav-placeholder"></div>
<div class="page">
  <div class="fu">
    <div class="page-title serif">🎨 Visual Trends</div>
    <div class="page-sub">Top colours, styles, phrases and design directions across global Etsy markets</div>
  </div>
  <div class="card fu" style="display:flex;gap:10px;flex-wrap:wrap">
    <input id="tr-kw" placeholder="Enter niche e.g. wall art, custom mug, tote bag..." style="flex:1" onkeydown="if(event.key==='Enter')doTrends()"/>
    <button class="btn-olive" onclick="doTrends()">Analyse Trends →</button>
    <button class="btn-ghost" onclick="doGlobalTrends()">🌍 Global Etsy Trends</button>
  </div>
  <div id="tr-res"></div>
</div>
<script src="js/auth.js?v=5"></script>
<script>
requireAuth();
document.getElementById('nav-placeholder').innerHTML = renderNav('trends.html');
function getKeys(){return{etsy:localStorage.getItem('oe_etsy')||'',groq:localStorage.getItem('oe_groq')||''};}
async function callGroq(prompt){
  const keys=getKeys();
  const r=await fetch('https://api.groq.com/openai/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+keys.groq},body:JSON.stringify({model:'llama-3.3-70b-versatile',messages:[{role:'system',content:'Expert Etsy market analyst specialising in visual trends and design intelligence.'},{role:'user',content:prompt+'\n\nReturn ONLY valid raw JSON starting with { ending with }'}],temperature:0.2,max_tokens:2048})});
  const d=await r.json();if(!r.ok)throw new Error(d.error?.message||'Error');
  const t=d.choices?.[0]?.message?.content||'';const s=t.indexOf('{'),e=t.lastIndexOf('}');if(s<0||e<0)throw new Error('No JSON');return JSON.parse(t.slice(s,e+1));
}
async function callEtsy(path){
  const keys=getKeys();if(!keys.etsy)throw new Error('No Etsy key');
  const r=await fetch('https://openapi.etsy.com/v3/application/'+path,{headers:{'x-api-key':keys.etsy}});if(!r.ok)throw new Error('Etsy '+r.status);return r.json();
}
async function doTrends(){
  const kw=document.getElementById('tr-kw').value.trim();if(!kw)return;
  const res=document.getElementById('tr-res');
  res.innerHTML=`<div class="card"><div class="loading-row"><div class="spin"></div>Pulling live Etsy data and analysing visual trends for "${kw}"...</div></div>`;
  let listings=[],tags=[];
  const keys=getKeys();
  if(keys.etsy){try{const er=await callEtsy(`listings/active?keywords=${encodeURIComponent(kw)}&limit=50&sort_on=score`);listings=er.results||[];const tm={};listings.forEach(l=>(l.tags||[]).forEach(t=>tm[t]=(tm[t]||0)+1));tags=Object.entries(tm).sort((a,b)=>b[1]-a[1]).map(e=>({tag:e[0],count:e[1]}));}catch(e){}}
  const ctx=listings.length?`${listings.length} live listings. Titles: ${listings.slice(0,8).map(l=>'"'+l.title+'"').join(' | ')}. Tags: ${tags.slice(0,10).map(t=>t.tag).join(', ')}`:'';
  try{
    const d=await callGroq(`Analyse visual design trends for Etsy "${kw}" globally across UK, USA, Germany, Australia. ${ctx}
Return JSON: {"niche":"${kw}","topColours":[{"name":"colour","hex":"#RRGGBB","popularity":80,"markets":["UK","USA"],"mood":"calm"}],"colourPalettes":[{"name":"palette","colours":["#hex1","#hex2","#hex3"],"popularity":70,"context":"use case","markets":["UK","USA"]}],"dominantStyles":[{"style":"Minimalist","popularity":65,"desc":"clean lines no clutter","popularIn":["UK","Germany"]}],"fontStyles":[{"style":"Script","popularity":55,"mood":"elegant","examples":"wedding fonts","bestFor":["mugs","posters"]}],"topPhrases":[{"phrase":"exact phrase","frequency":45,"emotion":"funny|sentimental|empowering","markets":["UK","USA"]}],"risingPhrases":["phrase1","phrase2"],"saturatedPhrases":["avoid1","avoid2"],"imageTypes":[{"type":"Lifestyle","popularity":70,"desc":"real person using product"}],"layoutTypes":[{"layout":"Text-only","popularity":50}],"marketDesign":{"UK":"UK preference","USA":"USA preference","Germany":"Germany preference","Australia":"Aus preference"},"winningFormula":"detailed design formula paragraph","pinterestDirection":"what pinterest is showing for this niche"}`);
    let html=`<div class="card-gold fu"><div class="lbl" style="color:var(--gd)">🏆 Winning Design Formula</div><p style="font-size:15px;line-height:1.85;font-family:Cormorant Garamond,serif">${d.winningFormula}</p><div style="margin-top:12px;padding:12px;background:var(--p3);border-radius:8px"><div class="lbl" style="color:var(--or)">📌 Pinterest Direction</div><p style="font-size:13px;color:var(--mu)">${d.pinterestDirection||''}</p></div></div>`;
    if(d.colourPalettes?.length){html+=`<div class="card d1"><div class="lbl" style="color:var(--ol)">🎨 Colour Palettes</div><div class="grid-auto">`;d.colourPalettes.forEach(p=>{html+=`<div class="card2"><div style="display:flex;gap:6px;margin-bottom:10px">${(p.colours||[]).map(h=>`<div style="width:36px;height:36px;border-radius:6px;background:${h};border:1px solid rgba(0,0,0,.1)" title="${h}"></div>`).join('')}</div><div style="font-weight:600;font-size:14px;margin-bottom:4px">${p.name}</div><div style="font-size:11px;color:var(--mu);margin-bottom:6px">${p.context}</div>${pbar(p.popularity,'var(--gd)')}<div style="font-size:10px;color:var(--mu);margin-top:3px">${p.popularity}% · ${(p.markets||[]).join(', ')}</div></div>`;});html+=`</div></div>`;}
    html+=`<div class="card d2"><div class="lbl">🎨 Individual Colours</div>`;(d.topColours||[]).forEach(c=>{html+=`<div style="display:flex;align-items:center;gap:12px;margin-bottom:12px"><div style="width:42px;height:42px;border-radius:7px;background:${c.hex};border:1px solid rgba(0,0,0,.1);flex-shrink:0"></div><div style="flex:1"><div style="font-weight:600;font-size:14px;margin-bottom:3px">${c.name} <span class="mono" style="font-size:10px;color:var(--mu2)">${c.hex}</span> · ${c.mood}</div>${pbar(c.popularity,c.hex)}</div><span class="mono" style="font-size:12px;color:var(--mu)">${c.popularity}%</span></div>`;});html+=`</div>`;
    html+=`<div class="grid-2 d2"><div class="card"><div class="lbl">💬 Top Selling Phrases</div>`;(d.topPhrases||[]).forEach(p=>{html+=`<div style="padding:10px 0;border-bottom:1px solid var(--b1)"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:15px;font-style:italic;font-weight:600;color:var(--gd);font-family:Cormorant Garamond,serif">"${p.phrase}"</span><span class="badge b-gold">×${p.frequency}</span></div><div style="font-size:11px;color:var(--mu)">${p.emotion} · ${(p.markets||[]).join(', ')}</div></div>`;});if(d.risingPhrases?.length){html+=`<div style="margin-top:10px"><div class="lbl" style="color:var(--ol)">⬆️ Rising</div>${d.risingPhrases.map(p=>`<span class="pill-o" style="background:var(--olbg);border:1px solid var(--olbr);border-radius:20px;padding:3px 11px;font-size:11px;color:var(--ol);font-family:DM Mono,monospace;margin:2px;display:inline-block">"${p}"</span>`).join('')}</div>`;}if(d.saturatedPhrases?.length){html+=`<div style="margin-top:10px"><div class="lbl" style="color:var(--rd)">🚫 Avoid</div>${d.saturatedPhrases.map(p=>`<span class="pill-r" style="background:var(--rdbg);border:1px solid var(--rdbr);border-radius:20px;padding:3px 11px;font-size:11px;color:var(--rd);font-family:DM Mono,monospace;margin:2px;display:inline-block">"${p}"</span>`).join('')}</div>`;}html+=`</div>`;
    html+=`<div class="card"><div class="lbl">🔤 Font Styles</div>`;(d.fontStyles||[]).forEach(f=>{html+=`<div class="card2" style="margin-bottom:8px"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><strong>${f.style}</strong><span class="mono" style="color:var(--gd)">${f.popularity}%</span></div><div style="font-size:11px;color:var(--mu);margin-bottom:4px">${f.mood} · ${f.examples}</div><div style="font-size:11px;color:var(--ol)">Best for: ${f.bestFor?.join(', ')}</div></div>`;});html+=`<div style="margin-top:12px"><div class="lbl">Design Styles</div>`;(d.dominantStyles||[]).forEach(s=>{html+=`<div style="margin-bottom:8px"><div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px"><span style="font-weight:600">${s.style}</span><span class="mono">${s.popularity}%</span></div><div style="font-size:12px;color:var(--mu);margin-bottom:4px">${s.desc} · ${(s.popularIn||[]).join(', ')}</div>${pbar(s.popularity,'var(--ol)')}</div>`;});html+=`</div></div></div>`;
    if(d.marketDesign){html+=`<div class="card d3"><div class="lbl">🌍 Design by Market</div><div class="grid-2">`;Object.entries(d.marketDesign).forEach(([k,v])=>{const f={'UK':'🇬🇧','USA':'🇺🇸','Germany':'🇩🇪','Australia':'🇦🇺'}[k]||'🌍';html+=`<div class="card2"><div style="font-weight:600;margin-bottom:6px">${f} ${k}</div><p style="font-size:13px;color:var(--mu);line-height:1.6">${v}</p></div>`;});html+=`</div></div>`;}
    res.innerHTML=html;
  }catch(e){res.innerHTML=errBox(e.message);}
}
async function doGlobalTrends(){
  const res=document.getElementById('tr-res');
  res.innerHTML=`<div class="card"><div class="loading-row"><div class="spin"></div>Loading global Etsy trends 2025...</div></div>`;
  try{
    const d=await callGroq('What are the global visual design trends on Etsy right now in 2025? What colours, styles, phrases, aesthetics are trending across UK, USA, Germany, Australia? Return JSON: {"hotStyles":[{"style":"name","popularity":75,"markets":["UK","USA"],"desc":"description"}],"hotColours":["colour1","colour2","colour3","colour4","colour5"],"hotPhrases":["phrase1","phrase2","phrase3","phrase4","phrase5"],"aesthetics":["Cottagecore","Dark Academia","Coastal Grandma","Minimalist","Boho"],"declining":["declining1","declining2"],"pinterestHot":["trend1","trend2","trend3"],"byMarket":{"UK":{"trending":["t1","t2"],"colours":["c1","c2"]},"USA":{"trending":["t1","t2"],"colours":["c1","c2"]},"Germany":{"trending":["t1","t2"],"colours":["c1","c2"]},"Australia":{"trending":["t1","t2"],"colours":["c1","c2"]}}}');
    let html=`<div class="card-olive fu"><div class="lbl" style="color:var(--ol)">🔥 Hot Global Styles Right Now</div><div class="grid-auto">`;
    (d.hotStyles||[]).forEach(s=>{html+=`<div class="card2"><div style="font-weight:700;font-size:15px;margin-bottom:5px">${s.style}</div><div style="font-size:12px;color:var(--mu);margin-bottom:8px">${s.desc}</div>${pbar(s.popularity,'var(--ol)')}<div style="font-size:10px;color:var(--mu);margin-top:4px">${(s.markets||[]).join(', ')}</div></div>`;});
    html+=`</div></div><div class="grid-2 d1"><div class="card"><div class="lbl">🎨 Hottest Colours</div>${(d.hotColours||[]).map(c=>`<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--b1)"><span style="width:18px;height:18px;border-radius:50%;background:${c.startsWith('#')?c:'var(--p3)'};border:1px solid rgba(0,0,0,.1);display:inline-block;flex-shrink:0"></span><span style="font-size:13px">${c}</span></div>`).join('')}</div>`;
    html+=`<div class="card"><div class="lbl">📌 Pinterest Hot Now</div>${(d.pinterestHot||[]).map(t=>`<div style="display:flex;gap:8px;padding:7px 0;border-bottom:1px solid var(--b1)"><span style="color:#e60023">📌</span><span style="font-size:13px">${t}</span></div>`).join('')}<div style="margin-top:10px"><div class="lbl" style="color:var(--rd)">⬇️ Declining — Avoid</div>${(d.declining||[]).map(t=>`<div style="padding:6px 0;font-size:13px;color:var(--mu);text-decoration:line-through">${t}</div>`).join('')}</div></div></div>`;
    html+=`<div class="card d2"><div class="lbl">🌍 Trends by Market</div><div class="grid-2">`;
    Object.entries(d.byMarket||{}).forEach(([k,v])=>{const f={'UK':'🇬🇧','USA':'🇺🇸','Germany':'🇩🇪','Australia':'🇦🇺'}[k]||'🌍';html+=`<div class="card2"><div style="font-weight:600;margin-bottom:8px">${f} ${k}</div><div class="lbl">Trending</div>${(v.trending||[]).map(t=>`<div style="font-size:12px;padding:4px 0;border-bottom:1px solid var(--b1)">→ ${t}</div>`).join('')}<div class="lbl" style="margin-top:8px">Hot Colours</div>${(v.colours||[]).map(c=>`<span class="pill">${c}</span>`).join('')}</div>`;});
    html+=`</div></div><div class="card-gold d2"><div class="lbl" style="color:var(--gd)">✨ Hot Aesthetics</div><div>${(d.aesthetics||[]).map(a=>`<span style="background:var(--gdbg);border:1px solid var(--gdbr);border-radius:20px;padding:5px 14px;font-size:13px;font-weight:600;color:var(--gd);margin:3px;display:inline-block">${a}</span>`).join('')}</div><div style="margin-top:12px"><div class="lbl">💬 Hot Phrases</div>${(d.hotPhrases||[]).map(p=>`<span style="font-style:italic;color:var(--gd);font-size:15px;font-family:Cormorant Garamond,serif;margin:4px;display:inline-block">"${p}"</span>`).join(' · ')}</div></div>`;
    res.innerHTML=html;
  }catch(e){res.innerHTML=errBox(e.message);}
}
</script>
</body>
</html>
