<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Olive Edge — Login</title>
<link rel="stylesheet" href="css/style.css"/>
<style>
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.login-box{max-width:440px;width:100%}
.login-card{background:var(--w);border:1px solid var(--b1);border-radius:14px;padding:36px;box-shadow:0 4px 20px rgba(40,34,24,.08)}
.login-logo{text-align:center;margin-bottom:32px}
.login-logo .sub{font-size:12px;letter-spacing:.3em;color:var(--mu);text-transform:uppercase;font-family:'Jost',sans-serif}
.login-logo .main{font-family:'Cormorant Garamond',serif;font-size:42px;color:var(--tx);font-weight:600;line-height:1.1}
.login-logo .main span{color:var(--gd)}
.login-logo .tagline{font-size:13px;color:var(--mu);margin-top:6px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--mu);margin-bottom:6px}
.msg{margin-top:12px;padding:10px 14px;border-radius:8px;font-size:13px;font-weight:500;display:none}
.msg.show{display:block}
.msg.ok{background:var(--olbg);color:var(--ol);border:1px solid var(--olbr)}
.msg.err{background:var(--rdbg);color:var(--rd);border:1px solid var(--rdbr)}
.divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--mu2);font-size:12px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--b1)}
.tab-row{display:flex;gap:0;margin-bottom:24px;border:1.5px solid var(--b1);border-radius:8px;overflow:hidden}
.tab-btn{flex:1;background:transparent;border:none;padding:10px;font-family:'Jost',sans-serif;font-size:13px;font-weight:600;color:var(--mu);cursor:pointer;transition:all .15s}
.tab-btn.on{background:var(--ol);color:#fff}
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-box fu">
    <div class="login-card">
      <div class="login-logo">
        <div class="sub">Golden Olive</div>
        <div class="main">Olive <span>Edge</span></div>
        <div class="tagline">Global Etsy Market Intelligence</div>
      </div>

      <div class="tab-row">
        <button class="tab-btn on" id="tab-login" onclick="switchTab('login')">Log In</button>
        <button class="tab-btn" id="tab-signup" onclick="switchTab('signup')">Sign Up</button>
      </div>

      <div id="login-form">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="login-email" placeholder="your@email.com" onkeydown="if(event.key==='Enter')doLogin()"/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="login-pass" placeholder="Password" onkeydown="if(event.key==='Enter')doLogin()"/>
        </div>
        <button class="btn-olive" style="width:100%;padding:12px;font-size:15px;margin-top:6px" onclick="doLogin()">Log In →</button>
      </div>

      <div id="signup-form" style="display:none">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="signup-email" placeholder="your@email.com"/>
        </div>
        <div class="form-group">
          <label>Password (min 6 characters)</label>
          <input type="password" id="signup-pass" placeholder="Choose a password"/>
        </div>
        <button class="btn-gold" style="width:100%;padding:12px;font-size:15px;margin-top:6px" onclick="doSignup()">Create Account →</button>
      </div>

      <div class="msg" id="msg"></div>

      <div style="margin-top:20px;padding:14px;background:var(--p2);border-radius:8px;border:1px solid var(--b1);font-size:12px;color:var(--mu);line-height:1.8">
        <strong style="color:var(--gd)">What's inside:</strong><br>
        🔥 Real-time Opportunity Finder · 🔍 Product &amp; Shop Scanner<br>
        🎨 Visual Trends · 💰 Supplier Comparison · 📋 Team Workspace<br>
        🌍 Global Markets: UK · USA · Canada · Australia · Germany · France
      </div>
    </div>
  </div>
</div>

<script src="js/auth.js?v=4"></script>
<script>
// Check if already logged in
(function(){
  const s = getSession();
  if (s.token && s.email) window.location.href = 'dashboard.html';
})();

function switchTab(tab) {
  document.getElementById('login-form').style.display = tab==='login' ? 'block' : 'none';
  document.getElementById('signup-form').style.display = tab==='signup' ? 'block' : 'none';
  document.getElementById('tab-login').classList.toggle('on', tab==='login');
  document.getElementById('tab-signup').classList.toggle('on', tab==='signup');
  showMsg('', '');
}

function showMsg(text, type) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg' + (text ? ' show ' + type : '');
}

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-pass').value;
  if (!email || !pass) { showMsg('Please enter email and password.', 'err'); return; }
  showMsg('Logging in...', 'ok');
  try {
    const data = await supabaseLogin(email, pass);
    setSession(data.access_token, data.user?.email || email, data.user?.id || '');
    showMsg('Success! Redirecting...', 'ok');
    setTimeout(() => window.location.href = 'dashboard.html', 600);
  } catch(e) {
    showMsg(e.message, 'err');
  }
}

async function doSignup() {
  const email = document.getElementById('signup-email').value.trim();
  const pass = document.getElementById('signup-pass').value;
  if (!email || !pass) { showMsg('Please enter email and password.', 'err'); return; }
  if (pass.length < 6) { showMsg('Password must be at least 6 characters.', 'err'); return; }
  showMsg('Creating account...', 'ok');
  try {
    await supabaseSignUp(email, pass);
    showMsg('Account created! Please check your email to confirm, then log in.', 'ok');
    switchTab('login');
  } catch(e) {
    showMsg(e.message, 'err');
  }
}
</script>
</body>
</html>
