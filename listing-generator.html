<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Listing Generator — Olive Edge</title>
<link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div id="nav-placeholder"></div>
<div class="page">
  <div class="fu">
    <div class="page-title serif">✍️ Listing Generator</div>
    <div class="page-sub">Describe your product — get a complete, SEO-optimised Etsy listing ready to copy and paste</div>
  </div>

  <div class="card fu">
    <div class="grid-2" style="gap:14px;margin-bottom:14px">
      <div>
        <div class="lbl">Product Description</div>
        <textarea id="gen-product" placeholder="e.g. A ceramic 11oz mug with a funny cat design and the phrase 'But First Coffee'. White background, black text and cat illustration. For cat lovers and coffee drinkers." style="min-height:100px"></textarea>
      </div>
      <div>
        <div class="lbl">Target Audience</div>
        <input id="gen-audience" placeholder="e.g. cat lovers, coffee lovers, gift for mum" style="margin-bottom:10px"/>
        <div class="lbl">Primary Market</div>
        <select id="gen-market" style="margin-bottom:10px">
          <option value="UK">🇬🇧 UK (Primary)</option>
          <option value="USA">🇺🇸 USA</option>
          <option value="Germany">🇩🇪 Germany</option>
          <option value="Australia">🇦🇺 Australia</option>
        </select>
        <div class="lbl">Product Type</div>
        <select id="gen-type">
          <option value="physical POD">Physical POD (mug, tote, print)</option>
          <option value="digital download">Digital Download</option>
          <option value="personalised POD">Personalised POD</option>
          <option value="wall art print">Wall Art Print</option>
          <option value="clothing POD">Clothing (t-shirt, hoodie)</option>
          <option value="home decor POD">Home Decor POD</option>
          <option value="stationery">Stationery / Cards</option>
          <option value="candle">Candle / Gift</option>
        </select>
      </div>
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center">
      <button class="btn-olive" onclick="generateListing()" id="gen-btn">✍️ Generate Full Listing</button>
      <button class="btn-ghost" onclick="generateMultiple()" id="gen-multi-btn">Generate 3 Variations</button>
    </div>
  </div>

  <!-- Quick start chips -->
  <div style="margin-bottom:14px">
    <div class="lbl">Quick Start Examples</div>
    <div id="example-chips"></div>
  </div>

  <div id="gen-result"></div>
</div>

<script src="js/auth.js"></script>
<script>
requireAuth();
document.getElementById('nav-placeholder').innerHTML=renderNav('listing-generator.html');

window.onload=function(){
  var examples=[
    {label:'Funny Cat Mug',product:'11oz ceramic mug with funny cat illustration and the phrase "But First Coffee". White mug, black cat drawing, black text.',audience:'cat lovers, coffee lovers, gift for her'},
    {label:'Personalised Name Print',product:'A4 personalised name print with floral watercolour border. Custom name in script font, sage green and blush pink colours.',audience:'new baby, nursery decor, new parents'},
    {label:'Motivational Tote Bag',product:'Canvas tote bag with the quote "She Believed She Could So She Did" in bold serif font. Natural canvas colour, black text.',audience:'women, feminism, gift for friend, graduation'},
    {label:'Pet Portrait Print',product:'Custom pet portrait art print in watercolour style. Customer sends photo, we create a stylised portrait of their dog or cat.',audience:'dog lovers, cat owners, pet parents, gift'},
    {label:'Wedding Print',product:'Personalised wedding print with couple names and date. Minimalist design, gold foil effect, A4 size. Elegant script font.',audience:'newlyweds, wedding gift, anniversary'},
    {label:'Funny Slogan Shirt',product:'Unisex t-shirt with the slogan "I Have A Lot Of Growing To Do Said My Plant Collection". Sage green shirt, white text.',audience:'plant lovers, gardeners, plant mum gift'}
  ];
  var el=document.getElementById('example-chips');
  if(el){
    var h='';
    for(var i=0;i<examples.length;i++){
      var ex=examples[i];
      h+='<button class="btn-chip" onclick="loadExample('+i+')">'+ex.label+'</button>';
    }
    el.innerHTML=h;
    window._examples=examples;
  }
};

function loadExample(i){
  var ex=window._examples[i];
  document.getElementById('gen-product').value=ex.product;
  document.getElementById('gen-audience').value=ex.audience;
}

async function callAI(prompt){
  var r=await fetch('/api/groq',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({prompt:prompt})
  });
  var d=await r.json();
  if(!r.ok)throw new Error(d.error||'Server error '+r.status);
  return d;
}

function buildPrompt(product,audience,market,type,variationNum){
  var varNote=variationNum?'This is variation '+variationNum+' of 3. Make it meaningfully different in angle, tone or keyword focus.':'';
  return 'Write a complete, fully optimised Etsy listing for: "'+product+'". Target audience: '+audience+'. Primary market: '+market+'. Product type: '+type+'. '+varNote+'\n\nReturn JSON: {"title":"Complete SEO title max 140 chars, front-load main keyword","tags":["tag1","tag2","tag3","tag4","tag5","tag6","tag7","tag8","tag9","tag10","tag11","tag12","tag13"],"tagExplanations":{"tag1":"why this tag","tag2":"why this tag","tag3":"why this tag"},"description":"Full 300-500 word listing description. Start with a hook sentence. Include: what it is, who it is for, why they will love it, dimensions/specs, personalisation options if any, delivery info placeholder, care instructions if relevant. Use natural paragraph breaks. Naturally weave in keywords.","price":{"UK":"£X.XX","USA":"$X.XX","Germany":"€X.XX","Australia":"AU$X.XX"},"primaryKeyword":"the single most important search keyword","keywordDensity":"how naturally keywords are used","seoScore":8.5,"seoTips":["specific tip to improve this listing","tip2","tip3"],"materials":"what to put in materials field","attributes":{"occasion":"Birthday, Christmas etc","style":"Minimalist etc","colour":"main colour"},"shippingProfile":"suggested shipping profile name","photos":["photo 1 description","photo 2 description","photo 3 description","photo 4 description","photo 5 description"],"pinterestCaption":"Ready-to-use Pinterest caption for this product","instagramCaption":"Ready-to-use Instagram caption"}';
}

async function generateListing(){
  var product=document.getElementById('gen-product').value.trim();
  var audience=document.getElementById('gen-audience').value.trim();
  var market=document.getElementById('gen-market').value;
  var type=document.getElementById('gen-type').value;
  if(!product){alert('Please describe your product first');return;}
  if(!audience){audience='gift buyers, Etsy shoppers';}

  var res=document.getElementById('gen-result');
  res.innerHTML='<div class="card"><div class="loading-row"><div class="spin"></div>Writing your optimised Etsy listing...</div></div>';
  document.getElementById('gen-btn').disabled=true;

  try{
    var d=await callAI(buildPrompt(product,audience,market,type,null));
    res.innerHTML=renderListing(d,1,false);
    window._listing1=d;
  }catch(e){
    res.innerHTML='<div class="card-red"><strong>Error:</strong> '+e.message+'</div>';
  }
  document.getElementById('gen-btn').disabled=false;
}

async function generateMultiple(){
  var product=document.getElementById('gen-product').value.trim();
  var audience=document.getElementById('gen-audience').value.trim();
  var market=document.getElementById('gen-market').value;
  var type=document.getElementById('gen-type').value;
  if(!product){alert('Please describe your product first');return;}
  if(!audience){audience='gift buyers, Etsy shoppers';}

  var res=document.getElementById('gen-result');
  res.innerHTML='<div class="card"><div class="loading-row"><div class="spin"></div>Generating 3 different listing variations...</div></div>';
  document.getElementById('gen-multi-btn').disabled=true;

  try{
    // Generate all 3 in parallel
    var[d1,d2,d3]=await Promise.all([
      callAI(buildPrompt(product,audience,market,type,1)),
      callAI(buildPrompt(product,audience,market,type,2)),
      callAI(buildPrompt(product,audience,market,type,3))
    ]);

    // Tab switcher
    var html='<div class="card" style="padding:0;overflow:hidden">';
    html+='<div style="display:flex;border-bottom:2px solid var(--b1)">';
    html+='<button id="var-tab-1" onclick="showVar(1)" style="flex:1;padding:14px;font-family:Jost,sans-serif;font-size:13px;font-weight:700;border:none;cursor:pointer;background:var(--ol);color:#fff;border-radius:0">Variation 1</button>';
    html+='<button id="var-tab-2" onclick="showVar(2)" style="flex:1;padding:14px;font-family:Jost,sans-serif;font-size:13px;font-weight:600;border:none;cursor:pointer;background:var(--p2);color:var(--mu);border-radius:0">Variation 2</button>';
    html+='<button id="var-tab-3" onclick="showVar(3)" style="flex:1;padding:14px;font-family:Jost,sans-serif;font-size:13px;font-weight:600;border:none;cursor:pointer;background:var(--p2);color:var(--mu);border-radius:0">Variation 3</button>';
    html+='</div></div>';
    html+='<div id="var-1">'+renderListing(d1,1,true)+'</div>';
    html+='<div id="var-2" style="display:none">'+renderListing(d2,2,true)+'</div>';
    html+='<div id="var-3" style="display:none">'+renderListing(d3,3,true)+'</div>';

    res.innerHTML=html;
    window._listing1=d1;window._listing2=d2;window._listing3=d3;
  }catch(e){
    res.innerHTML='<div class="card-red"><strong>Error:</strong> '+e.message+'</div>';
  }
  document.getElementById('gen-multi-btn').disabled=false;
}

function showVar(n){
  [1,2,3].forEach(function(i){
    document.getElementById('var-'+i).style.display=i===n?'block':'none';
    var btn=document.getElementById('var-tab-'+i);
    btn.style.background=i===n?'var(--ol)':'var(--p2)';
    btn.style.color=i===n?'#fff':'var(--mu)';
  });
}

function renderListing(d,num,isVariation){
  var seoColor=d.seoScore>=8?'var(--ol)':d.seoScore>=6?'var(--gd)':'var(--rd)';
  var html='';

  // HEADER
  html+='<div class="card-live fu">';
  html+='<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:14px;flex-wrap:wrap;margin-bottom:16px">';
  html+='<div style="flex:1"><div class="lbl" style="color:var(--ol)">SEO Score</div>';
  html+='<div style="font-size:48px;font-weight:700;color:'+seoColor+';font-family:DM Mono,monospace;line-height:1">'+d.seoScore+'<span style="font-size:20px;color:var(--mu)">/10</span></div>';
  html+='<div style="font-size:13px;color:var(--mu);margin-top:4px">Primary keyword: <strong>'+d.primaryKeyword+'</strong></div></div>';
  html+='<div style="text-align:right">';
  html+='<button class="btn-olive" onclick="copyAll('+num+')">📋 Copy Everything</button>';
  html+='</div></div>';
  html+='<div class="grid-auto">';
  var priceKeys=Object.keys(d.price||{});
  for(var i=0;i<priceKeys.length;i++){
    var mk=priceKeys[i];
    html+='<div class="sbox"><div class="lbl">'+mk+' Price</div><div class="mono" style="font-size:16px;color:var(--gd);font-weight:700">'+(d.price[mk]||'—')+'</div></div>';
  }
  html+='</div></div>';

  // TITLE
  html+='<div class="card d1">';
  html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px">';
  html+='<span class="lbl" style="margin-bottom:0">Listing Title</span>';
  html+='<div style="display:flex;gap:8px;align-items:center">';
  html+='<span style="font-size:11px;color:'+(d.title&&d.title.length>140?'var(--rd)':'var(--gn)')+';font-family:DM Mono,monospace">'+(d.title?d.title.length:0)+'/140 chars</span>';
  html+='<button class="btn-ghost btn-sm" id="copy-title-'+num+'" onclick="copyField(\'title\','+num+')">Copy</button></div></div>';
  html+='<div style="background:var(--p2);border:1px solid var(--b1);border-radius:8px;padding:14px;font-size:15px;font-weight:600;line-height:1.5" id="title-field-'+num+'">'+d.title+'</div></div>';

  // TAGS
  html+='<div class="card d1">';
  html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px">';
  html+='<span class="lbl" style="margin-bottom:0">All 13 Etsy Tags</span>';
  html+='<button class="btn-ghost btn-sm" id="copy-tags-'+num+'" onclick="copyField(\'tags\','+num+')">Copy All 13</button></div>';
  html+='<div id="tags-field-'+num+'">';
  var tags=d.tags||[];
  for(var i=0;i<tags.length;i++){
    html+='<span class="pill" style="cursor:pointer" onclick="copySingleTag(\''+tags[i].replace(/'/g,"\\'")+'\')" title="Click to copy">'+tags[i]+'</span>';
  }
  html+='</div>';
  html+='<div style="margin-top:12px;background:var(--p3);border-radius:8px;padding:12px;cursor:pointer" onclick="copyField(\'tags\','+num+')">';
  html+='<p style="font-family:DM Mono,monospace;font-size:11px;line-height:2;word-break:break-word">'+tags.join(', ')+'</p></div>';

  // Tag explanations
  if(d.tagExplanations){
    html+='<div style="margin-top:12px"><div class="lbl">Why These Tags</div>';
    var tagExpKeys=Object.keys(d.tagExplanations);
    for(var i=0;i<Math.min(tagExpKeys.length,5);i++){
      var tk=tagExpKeys[i];
      html+='<div style="display:flex;gap:8px;padding:6px 0;border-bottom:1px solid var(--b1);font-size:12px"><span class="mono" style="color:var(--gd);flex-shrink:0;min-width:140px">'+tk+'</span><span style="color:var(--mu)">'+d.tagExplanations[tk]+'</span></div>';
    }
    html+='</div>';
  }
  html+='</div>';

  // DESCRIPTION
  html+='<div class="card d2">';
  html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px">';
  html+='<span class="lbl" style="margin-bottom:0">Full Description</span>';
  html+='<button class="btn-ghost btn-sm" id="copy-desc-'+num+'" onclick="copyField(\'desc\','+num+')">Copy Description</button></div>';
  html+='<div id="desc-field-'+num+'" style="background:var(--p2);border:1px solid var(--b1);border-radius:8px;padding:16px;font-size:13px;line-height:1.85;white-space:pre-wrap;cursor:pointer" onclick="copyField(\'desc\','+num+')">'+d.description+'</div></div>';

  // SEO TIPS + ATTRIBUTES
  html+='<div class="grid-2 d2">';
  html+='<div class="card"><div class="lbl" style="color:var(--gd)">SEO Tips for This Listing</div>';
  var tips=d.seoTips||[];
  for(var i=0;i<tips.length;i++){
    html+='<div style="display:flex;gap:8px;margin-bottom:10px;font-size:13px;line-height:1.6"><span style="color:var(--gd);font-weight:700">'+(i+1)+'.</span>'+tips[i]+'</div>';
  }
  html+='</div>';

  html+='<div class="card"><div class="lbl">Listing Attributes</div>';
  if(d.materials)html+='<div style="margin-bottom:10px">'+sboxSimple('Materials / Medium',d.materials)+'</div>';
  if(d.shippingProfile)html+='<div style="margin-bottom:10px">'+sboxSimple('Shipping Profile',d.shippingProfile)+'</div>';
  var attrs=d.attributes||{};var attrKeys=Object.keys(attrs);
  for(var i=0;i<attrKeys.length;i++){html+='<div style="margin-bottom:8px">'+sboxSimple(attrKeys[i],attrs[attrKeys[i]])+'</div>';}
  html+='</div></div>';

  // PHOTO BRIEF
  html+='<div class="card d3"><div class="lbl">📸 Photo Brief — 5 Photos to Shoot</div>';
  html+='<p style="font-size:12px;color:var(--mu);margin-bottom:12px">Etsy listings with 5+ photos get significantly more clicks. Here is exactly what to shoot:</p>';
  var photos=d.photos||[];
  for(var i=0;i<photos.length;i++){
    html+='<div style="display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--b1);align-items:flex-start">';
    html+='<div style="width:32px;height:32px;border-radius:50%;background:var(--olbg);border:2px solid var(--olbr);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:var(--ol);flex-shrink:0">'+(i+1)+'</div>';
    html+='<p style="font-size:13px;line-height:1.6;margin-top:4px">'+photos[i]+'</p></div>';
  }
  html+='</div>';

  // SOCIAL CAPTIONS
  html+='<div class="grid-2 d3">';
  if(d.pinterestCaption){
    html+='<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">';
    html+='<span class="lbl" style="margin-bottom:0;color:#e60023">📌 Pinterest Caption</span>';
    html+='<button class="btn-ghost btn-sm" onclick="copyText(\''+d.pinterestCaption.replace(/'/g,"\\'").replace(/\n/g,' ')+'\',this)">Copy</button></div>';
    html+='<div style="background:var(--p2);border-radius:8px;padding:12px;font-size:13px;line-height:1.6">'+d.pinterestCaption+'</div></div>';
  }
  if(d.instagramCaption){
    html+='<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">';
    html+='<span class="lbl" style="margin-bottom:0;color:#833ab4">📷 Instagram Caption</span>';
    html+='<button class="btn-ghost btn-sm" onclick="copyText(\''+d.instagramCaption.replace(/'/g,"\\'").replace(/\n/g,' ')+'\',this)">Copy</button></div>';
    html+='<div style="background:var(--p2);border-radius:8px;padding:12px;font-size:13px;line-height:1.6">'+d.instagramCaption+'</div></div>';
  }
  html+='</div>';

  // COPY ALL BUTTON AT BOTTOM
  html+='<div class="card-olive d4"><div class="lbl" style="color:var(--ol)">Ready to list? Copy everything at once</div>';
  html+='<p style="font-size:13px;color:var(--mu);margin-bottom:12px">Copies title, all 13 tags and full description in one go — ready to paste into Etsy.</p>';
  html+='<button class="btn-olive" onclick="copyAll('+num+')">📋 Copy Complete Listing</button></div>';

  // Store data
  window['_listing'+num]=d;

  return html;
}

function sboxSimple(l,v){
  return '<div style="background:var(--p2);border:1px solid var(--b1);border-radius:7px;padding:10px"><div style="font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--mu);margin-bottom:4px">'+l+'</div><div style="font-size:13px;font-weight:600">'+v+'</div></div>';
}

function copyField(field,num){
  var d=window['_listing'+num];
  if(!d)return;
  var text='';
  var btnId='';
  if(field==='title'){text=d.title||'';btnId='copy-title-'+num;}
  else if(field==='tags'){text=(d.tags||[]).join(', ');btnId='copy-tags-'+num;}
  else if(field==='desc'){text=d.description||'';btnId='copy-desc-'+num;}
  var btn=document.getElementById(btnId);
  copyText(text,btn);
}

function copySingleTag(tag){
  if(navigator.clipboard){navigator.clipboard.writeText(tag);}
  else{var el=document.createElement('textarea');el.value=tag;document.body.appendChild(el);el.select();document.execCommand('copy');document.body.removeChild(el);}
}

function copyAll(num){
  var d=window['_listing'+num];
  if(!d)return;
  var text='TITLE:\n'+d.title+'\n\nTAGS:\n'+(d.tags||[]).join(', ')+'\n\nDESCRIPTION:\n'+d.description;
  if(navigator.clipboard){
    navigator.clipboard.writeText(text).then(function(){alert('Complete listing copied! Paste it into Etsy now.');});
  }else{
    var el=document.createElement('textarea');el.value=text;document.body.appendChild(el);el.select();document.execCommand('copy');document.body.removeChild(el);
    alert('Complete listing copied! Paste it into Etsy now.');
  }
}
</script>
</body>
</html>
