<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Opportunity Finder — Olive Edge</title>
<link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div id="nav-placeholder"></div>
<div class="page">
  <div class="fu">
    <div class="page-title serif">🔥 Opportunity Finder</div>
    <div class="page-sub">Etsy · Printify · Printful · Reddit · Groq AI — all real data combined</div>
  </div>
  <div class="card fu" style="display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end">
    <div style="flex:1;min-width:220px">
      <div class="lbl">Keyword or Product Idea</div>
      <input id="opp-kw" placeholder="e.g. custom mug, pet portrait, wall art, tote bag..."/>
    </div>
    <div style="min-width:160px">
      <div class="lbl">Primary Market</div>
      <select id="opp-market">
        <option value="GB">UK (Primary)</option>
        <option value="US">USA</option>
        <option value="DE">Germany</option>
        <option value="AU">Australia</option>
        <option value="CA">Canada</option>
        <option value="FR">France</option>
      </select>
    </div>
    <button class="btn-olive" onclick="doOpportunity()">Find Opportunity</button>
  </div>
  <div style="margin-bottom:14px"><div class="lbl">Quick Ideas</div><div id="quick-chips"></div></div>
  <div class="card" style="padding:12px">
    <div class="lbl" style="margin-bottom:8px">Data Sources</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <span class="badge" id="src-etsy" style="background:var(--p2);color:var(--mu);border:1px solid var(--b1)">Etsy: Pending</span>
      <span class="badge b-live" id="src-printify">Printify Loading...</span>
      <span class="badge b-live" id="src-printful">Printful Loading...</span>
      <span class="badge" id="src-reddit" style="background:var(--p2);color:var(--mu);border:1px solid var(--b1)">Reddit</span>
      <span class="badge b-gold" id="src-ai">Groq AI Ready</span>
    </div>
  </div>
  <div id="opp-result"></div>
</div>
<script src="js/auth.js?v=5"></script>
<script>
requireAuth();
document.getElementById('nav-placeholder').innerHTML=renderNav('opportunities.html');

(function(){
  var chips=['custom mug','pet portrait','wall art print','tote bag','wedding invitation','candle gift','baby nursery art','funny slogan shirt','digital planner','personalised keyring','die cut sticker','motivational poster'];
  var el=document.getElementById('quick-chips');
  if(el) el.innerHTML=chips.map(function(k){return '<button class="btn-chip" onclick="document.getElementById(\'opp-kw\').value=\''+k+'\';doOpportunity()">'+k+'</button>';}).join('');
})();

var urlKw=new URLSearchParams(window.location.search).get('kw');
if(urlKw) document.getElementById('opp-kw').value=urlKw;

function getKeys(){return{etsy:localStorage.getItem('oe_etsy')||'',groq:localStorage.getItem('oe_groq')||''};}

function sbox(l,v,c){return '<div class="sbox"><div class="lbl">'+l+'</div><div class="mono" style="font-size:16px;color:'+(c||'var(--tx)')+';font-weight:600">'+(v||'--')+'</div></div>';}
function pbar(p,c,h){h=h||5;return '<div class="pbar" style="height:'+h+'px"><div class="pbf" style="width:'+Math.min(100,p||0)+'%;background:'+(c||'var(--gd)')+';height:'+h+'px"></div></div>';}
function fmt(n){return n>=1000?(n/1000).toFixed(1)+'k':String(n||0);}
function compColor(c){return c==='Low'?'var(--gn)':c==='Medium'?'var(--gd)':c==='High'?'var(--or)':'var(--rd)';}
function setBadge(id,ok,label){
  var el=document.getElementById(id);if(!el)return;
  el.textContent=label;
  el.className=ok?'badge b-live':'badge';
  if(!ok){el.style.background='var(--p2)';el.style.color='var(--mu)';el.style.border='1px solid var(--b1)';}
}

async function callGroq(prompt){
  var keys=getKeys();
  if(!keys.groq){throw new Error('No Groq key — please add it from dashboard');}
  var r=await fetch('https://api.groq.com/openai/v1/chat/completions',{
    method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+keys.groq},
    body:JSON.stringify({model:'llama-3.3-70b-versatile',messages:[
      {role:'system',content:'Expert Etsy market analyst and POD strategist. Deep knowledge of Etsy UK/USA/Germany/Australia, Printify, Printful, Gelato, design trends, colour trends, font trends, what sells. Give specific numbers and concrete recommendations.'},
      {role:'user',content:prompt+'\n\nReturn ONLY valid raw JSON. No markdown. Start { end }'}
    ],temperature:0.2,max_tokens:3000})
  });
  var d=await r.json();
  if(!r.ok)throw new Error(d.error?.message||'Groq error');
  var t=d.choices?.[0]?.message?.content||'';
  var s=t.indexOf('{'),e=t.lastIndexOf('}');
  if(s<0||e<0)throw new Error('No JSON returned — please try again');
  return JSON.parse(t.slice(s,e+1));
}

async function callEtsy(path){
  var keys=getKeys();if(!keys.etsy)throw new Error('No Etsy key');
  var r=await fetch('https://openapi.etsy.com/v3/application/'+path,{headers:{'x-api-key':keys.etsy}});
  if(!r.ok)throw new Error('Etsy '+r.status);
  return r.json();
}

async function getPrintify(kw){
  try{
    var r=await fetch('https://api.printify.com/v1/catalog/blueprints.json');
    if(!r.ok)return[];
    var d=await r.json();var kl=kw.toLowerCase().split(' ')[0];
    setBadge('src-printify',true,'Printify '+((d||[]).length)+' products');
    return(d||[]).filter(function(p){return p.title&&p.title.toLowerCase().includes(kl);}).slice(0,6);
  }catch(e){setBadge('src-printify',false,'Printify unavailable');return[];}
}

async function getPrintful(kw){
  try{
    var r=await fetch('https://api.printful.com/products');
    if(!r.ok)return[];
    var d=await r.json();var kl=kw.toLowerCase().split(' ')[0];
    var results=(d.result||[]);
    setBadge('src-printful',true,'Printful '+results.length+' products');
    return results.filter(function(p){return p.type_name&&p.type_name.toLowerCase().includes(kl);}).slice(0,6);
  }catch(e){setBadge('src-printful',false,'Printful unavailable');return[];}
}

async function getReddit(kw){
  try{
    var r=await fetch('https://www.reddit.com/r/EtsySellers/search.json?q='+encodeURIComponent(kw)+'&sort=hot&limit=8&restrict_sr=1',{headers:{'Accept':'application/json'}});
    if(!r.ok)return[];
    var d=await r.json();
    var posts=(d.data?.children||[]).map(function(p){return{title:p.data.title,score:p.data.score,comments:p.data.num_comments,url:'https://reddit.com'+p.data.permalink,selftext:(p.data.selftext||'').slice(0,200)};});
    setBadge('src-reddit',posts.length>0,'Reddit '+posts.length+' posts');
    return posts;
  }catch(e){setBadge('src-reddit',false,'Reddit unavailable');return[];}
}

async function doOpportunity(){
  var kw=document.getElementById('opp-kw').value.trim();
  if(!kw){alert('Please enter a keyword');return;}
  var res=document.getElementById('opp-result');

  res.innerHTML='<div class="card"><div class="loading-row"><div class="spin"></div>Checking Printify & Printful catalogues...</div></div>';
  var[pfy,pfl]=await Promise.all([getPrintify(kw),getPrintful(kw)]);

  res.innerHTML='<div class="card"><div class="loading-row"><div class="spin"></div>Fetching Etsy live listings...</div></div>';
  var etsyL=[],etsyT=[],etsyP={};
  var keys=getKeys();
  if(keys.etsy){
    try{
      var er=await callEtsy('listings/active?keywords='+encodeURIComponent(kw)+'&limit=50&sort_on=score');
      etsyL=er.results||[];
      var tm={};etsyL.forEach(function(l){(l.tags||[]).forEach(function(t){tm[t]=(tm[t]||0)+1;});});
      etsyT=Object.entries(tm).sort(function(a,b){return b[1]-a[1];}).map(function(e){return{tag:e[0],count:e[1]};});
      var pp=etsyL.map(function(l){return(l.price?.amount||0)/100;}).filter(function(p){return p>0;}).sort(function(a,b){return a-b;});
      if(pp.length)etsyP={min:pp[0].toFixed(2),max:pp[pp.length-1].toFixed(2),avg:(pp.reduce(function(s,p){return s+p;},0)/pp.length).toFixed(2),median:pp[Math.floor(pp.length/2)].toFixed(2)};
      setBadge('src-etsy',true,'Etsy '+etsyL.length+' live listings');
    }catch(e){setBadge('src-etsy',false,'Etsy: '+e.message);}
  }

  res.innerHTML='<div class="card"><div class="loading-row"><div class="spin"></div>Scanning Reddit r/EtsySellers...</div></div>';
  var reddit=await getReddit(kw);

  res.innerHTML='<div class="card"><div class="loading-row"><div class="spin"></div>Running AI deep analysis across all data sources...</div></div>';

  var etsyCtx=etsyL.length
    ?'LIVE ETSY '+etsyL.length+' listings. Prices £'+etsyP.min+'-£'+etsyP.max+' avg £'+etsyP.avg+'. Top tags: '+etsyT.slice(0,12).map(function(t){return t.tag+'x'+t.count;}).join(',')+'. Most favourited: '+[...etsyL].sort(function(a,b){return(b.num_favorers||0)-(a.num_favorers||0);}).slice(0,3).map(function(l){return '"'+l.title+'" '+fmt(l.num_favorers||0)+'favs';}).join(' | ')
    :'No live Etsy data yet (API pending) — use your Etsy expertise.';
  var pfyCtx=pfy.length?'Printify catalogue matches: '+pfy.map(function(p){return p.title;}).join(', '):'';
  var pflCtx=pfl.length?'Printful catalogue matches: '+pfl.map(function(p){return p.type_name;}).join(', '):'';
  var rdCtx=reddit.length?'Reddit r/EtsySellers discussion: '+reddit.slice(0,4).map(function(p){return '"'+p.title+'"('+p.score+'upvotes)';}).join(' | '):'';

  try{
    var d=await callGroq(
      'Complete Etsy opportunity analysis for "'+kw+'". UK primary market. Also USA, Germany, Australia, Canada, France.\n'+
      etsyCtx+'\n'+pfyCtx+'\n'+pflCtx+'\n'+rdCtx+'\n\n'+
      'Return this exact JSON structure:\n'+
      '{"keyword":"'+kw+'",'+
      '"opportunityScore":7.5,'+
      '"demandScore":8,'+
      '"competitionScore":4,'+
      '"marginScore":7,'+
      '"saturationLevel":"Medium",'+
      '"verdict":"BUY IN",'+
      '"verdictReason":"one specific sentence",'+
      '"competingShops":"~X,XXX",'+
      '"estimatedMonthlySearches":"X,XXX-XX,XXX",'+
      '"fastGrowingAngle":"what new winning shops do differently",'+
      '"marketInsight":{"totalListings":"~X,XXX","reviewDensity":"X% have reviews","priceBand":"£X-£Y most common","weakCompetitors":"describe weak shop patterns","gapDetected":"specific profitable gap","hotOnReddit":"what community discusses","redditInsight":"key insight from community"},'+
      '"sellThisNow":{"product":"exact product name","format":"mug","platform":"Printify","baseCost":"£3.50","ukPrice":"£14.99","usaPrice":"$18.99","germanyPrice":"16.99","australiaPrice":"AU$24.99","canadaPrice":"CA$24.99","margin":"65%","bestColours":["Sage Green","Cream","Black"],"colourHexes":["#7C9A7E","#F5F0E8","#1A1A1A"],"bestFontStyle":"Script","fontReason":"Script fonts add perceived handmade value","bestDesignStyle":"Minimalist","designReason":"Clean designs have lower print complexity and wider appeal","bestPhrase":"exact winning phrase","phraseEmotion":"sentimental","designBrief":"3 sentences of specific design instructions","imageStyle":"Lifestyle"},'+
      '"visualIntel":{"topColours":[{"name":"Sage Green","hex":"#7C9A7E","popularity":72,"where":"background","hotMarkets":["UK","Germany"]},{"name":"Cream","hex":"#F5F0E8","popularity":65,"where":"background","hotMarkets":["UK","USA"]}],"topFontStyles":[{"style":"Script","popularity":58,"mood":"elegant personal","bestFor":["mugs","prints"],"examples":"Playfair, Pacifico"},{"style":"Bold Sans","popularity":45,"mood":"fun modern","bestFor":["totes","shirts"],"examples":"Montserrat Bold"}],"topDesignStyles":[{"style":"Minimalist","popularity":62,"desc":"clean text on plain background","popularIn":["UK","Germany","Netherlands"]},{"style":"Boho","popularity":48,"desc":"earthy tones floral elements","popularIn":["USA","Australia"]}],"topPhrases":[{"phrase":"actual winning phrase","frequency":42,"emotion":"sentimental","markets":["UK","USA"]},{"phrase":"second winning phrase","frequency":35,"emotion":"funny","markets":["USA","Australia"]}],"risingPhrases":["rising phrase 1","rising phrase 2"],"saturatedPhrases":["oversaturated phrase"],"imageTypes":[{"type":"Lifestyle","popularity":68,"desc":"person using product in real setting"},{"type":"Mockup","popularity":52,"desc":"product on clean background"}]},'+
      '"topTags":["tag1","tag2","tag3","tag4","tag5","tag6","tag7","tag8","tag9","tag10","tag11","tag12","tag13"],'+
      '"tagIntel":[{"tag":"tag1","competition":"Low","searchVolume":"High","recommended":true,"why":"reason"},{"tag":"tag2","competition":"Medium","searchVolume":"High","recommended":true,"why":"reason"},{"tag":"tag3","competition":"Low","searchVolume":"Medium","recommended":true,"why":"reason"},{"tag":"tag4","competition":"High","searchVolume":"High","recommended":false,"why":"reason"},{"tag":"tag5","competition":"Low","searchVolume":"Medium","recommended":true,"why":"reason"}],'+
      '"titleFormula":"[Adj] [Product] | [Keyword] | Gift for [Audience]",'+
      '"descriptionOpener":"Two sentence description opener that converts browsers to buyers.",'+
      '"seoKeywords":["keyword1","keyword2","keyword3","keyword4","keyword5"],'+
      '"globalDemand":{"UK":80,"USA":90,"Germany":60,"Australia":55,"Canada":50,"France":40},'+
      '"marketGaps":[{"market":"UK","gap":"specific gap in UK market","action":"exact action to take"},{"market":"USA","gap":"specific gap in USA market","action":"exact action to take"},{"market":"Germany","gap":"specific gap in Germany","action":"exact action to take"}],'+
      '"seasonality":[{"month":"Jan","score":40},{"month":"Feb","score":55},{"month":"Mar","score":60},{"month":"Apr","score":55},{"month":"May","score":60},{"month":"Jun","score":55},{"month":"Jul","score":50},{"month":"Aug","score":60},{"month":"Sep","score":65},{"month":"Oct","score":75},{"month":"Nov","score":88},{"month":"Dec","score":92}],'+
      '"podComparison":[{"platform":"Printify","product":"specific product name","baseCost":"£X","ukSellPrice":"£X","margin":"X%","shipsTo":"Worldwide","pro":"specific advantage","con":"specific disadvantage"},{"platform":"Printful","product":"specific product name","baseCost":"£X","ukSellPrice":"£X","margin":"X%","shipsTo":"Worldwide","pro":"specific advantage","con":"specific disadvantage"},{"platform":"Gelato","product":"specific product name","baseCost":"£X","ukSellPrice":"£X","margin":"X%","shipsTo":"UK+EU","pro":"specific advantage","con":"specific disadvantage"}],'+
      '"relatedProducts":["product1","product2","product3"],'+
      '"adjacentNiches":["niche1","niche2","niche3"],'+
      '"bundleIdeas":["bundle idea 1","bundle idea 2"],'+
      '"warnings":["specific warning 1","specific warning 2"],'+
      '"opportunities":["specific opportunity 1","specific opportunity 2","specific opportunity 3"]}'
    );

    setBadge('src-ai',true,'Groq AI Done');
    renderFull(d,kw,etsyL,etsyT,etsyP,reddit,pfy,pfl);

  }catch(e){
    res.innerHTML='<div class="card-red"><strong>Analysis failed:</strong> '+e.message+'<br><br>Make sure your Groq key is correct. Go to Dashboard and re-enter it if needed.</div>';
  }
}

function renderFull(d,kw,etsyL,etsyT,etsyP,reddit,pfy,pfl){
  var res=document.getElementById('opp-result');
  var sc=d.opportunityScore||7;
  var scClass=sc>=7?'score-high':sc>=5?'score-mid':'score-low';
  var vColor={'BUY IN':'var(--gn)','WORTH TESTING':'var(--gd)','PROCEED WITH CAUTION':'var(--or)','AVOID':'var(--rd)'}[d.verdict]||'var(--gd)';
  var mflags={'UK':'','USA':'','Germany':'','Australia':'','Canada':'','France':''};

  var html='';

  // HERO CARD
  html+='<div class="card-live fu">';
  html+='<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:14px;flex-wrap:wrap;margin-bottom:18px">';
  html+='<div style="flex:1"><div class="serif" style="font-size:34px;font-weight:600;margin-bottom:10px">'+d.keyword+'</div>';
  html+='<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:10px">';
  html+='<span style="background:'+vColor+'18;color:'+vColor+';border:1px solid '+vColor+'44;border-radius:20px;padding:5px 16px;font-size:13px;font-weight:700">'+d.verdict+'</span>';
  if(etsyL.length) html+='<span class="badge b-live"> '+etsyL.length+' Etsy Listings</span>';
  if(reddit.length) html+='<span class="badge" style="background:#fff4f0;color:#cc4400;border:1px solid #ffb0a0">Reddit '+reddit.length+' posts</span>';
  html+='</div><p style="font-size:14px;color:var(--mu);line-height:1.7">'+d.verdictReason+'</p></div>';
  html+='<div class="score-ring '+scClass+'" style="width:88px;height:88px;font-size:26px;font-weight:700">'+sc+'</div></div>';
  html+='<div class="grid-auto" style="margin-bottom:14px">';
  html+=sbox('Demand',d.demandScore+'/10',d.demandScore>=7?'var(--ol)':d.demandScore>=5?'var(--gd)':'var(--rd)');
  html+=sbox('Competition',d.competitionScore+'/10',d.competitionScore<=4?'var(--gn)':d.competitionScore<=6?'var(--gd)':'var(--rd)');
  html+=sbox('Margin Score',d.marginScore+'/10','var(--gd)');
  html+=sbox('Saturation',d.saturationLevel,compColor(d.saturationLevel));
  html+=sbox('Competing Shops',d.competingShops,'var(--mu)');
  html+=sbox('Monthly Searches',d.estimatedMonthlySearches,'var(--bl)');
  html+='</div>';
  if(etsyL.length) html+='<div class="grid-auto" style="margin-bottom:14px">'+sbox('Live Min','£'+etsyP.min,'var(--gn)')+sbox('Live Avg','£'+etsyP.avg,'var(--gd)')+sbox('Live Max','£'+etsyP.max,'var(--rd)')+sbox('Live Median','£'+etsyP.median,'var(--ol)')+'</div>';
  html+='<div style="display:flex;gap:8px;flex-wrap:wrap"><button class="btn-olive btn-sm" onclick="saveOpp(\''+kw.replace(/'/g,"\\'")+'\',\''+d.verdict+'\')">+ Save to Workspace</button><button class="btn-ghost btn-sm" onclick="exportOpp()">Export CSV</button></div></div>';

  // MARKET INSIGHT
  html+='<div class="card d1"><div class="lbl">Market Insight</div><div class="grid-2">';
  html+='<div>'+sbox('Total Listings',d.marketInsight?.totalListings,'var(--mu)')+'<div style="margin-top:8px">'+sbox('Price Band',d.marketInsight?.priceBand,'var(--gd)')+'</div><div style="margin-top:8px">'+sbox('Review Density',d.marketInsight?.reviewDensity,'var(--bl)')+'</div></div>';
  html+='<div><div style="padding:12px;background:var(--olbg);border-radius:8px;border:1px solid var(--olbr);margin-bottom:8px"><div class="lbl" style="color:var(--ol)">GAP DETECTED</div><p style="font-size:13px;line-height:1.6;font-weight:600">'+d.marketInsight?.gapDetected+'</p></div>';
  html+='<div style="padding:12px;background:var(--p2);border-radius:8px;border:1px solid var(--b1)"><div class="lbl">Weak Competitors</div><p style="font-size:12px;color:var(--mu);line-height:1.5">'+d.marketInsight?.weakCompetitors+'</p></div></div></div>';
  if(d.marketInsight?.hotOnReddit) html+='<div style="margin-top:10px;padding:12px;background:#fff4f0;border:1px solid #ffb0a0;border-radius:8px"><div class="lbl" style="color:#cc4400">Reddit r/EtsySellers</div><p style="font-size:13px;margin-bottom:4px">'+d.marketInsight?.hotOnReddit+'</p><p style="font-size:12px;color:var(--mu);font-style:italic">'+d.marketInsight?.redditInsight+'</p></div>';
  html+='<div style="margin-top:10px;padding:12px;background:var(--gdbg);border:1px solid var(--gdbr);border-radius:8px"><div class="lbl" style="color:var(--gd)">Fast Growing Angle</div><p style="font-size:13px;font-weight:600">'+d.fastGrowingAngle+'</p></div></div>';

  // SELL THIS NOW
  html+='<div class="card-gold d2"><div class="lbl" style="color:var(--gd)">SELL THIS NOW — Complete Product Brief</div>';
  html+='<div class="serif" style="font-size:24px;font-weight:600;margin-bottom:16px">'+d.sellThisNow?.product+'</div>';
  html+='<div class="grid-auto" style="margin-bottom:16px">'+sbox('Platform',d.sellThisNow?.platform,'var(--bl)')+sbox('Base Cost',d.sellThisNow?.baseCost,'var(--mu)')+sbox('UK',d.sellThisNow?.ukPrice,'var(--gd)')+sbox('USA',d.sellThisNow?.usaPrice,'var(--gd)')+sbox('Germany',d.sellThisNow?.germanyPrice,'var(--gd)')+sbox('Australia',d.sellThisNow?.australiaPrice,'var(--gd)')+sbox('Margin',d.sellThisNow?.margin,'var(--ol)')+'</div>';
  html+='<div style="background:var(--olbg);border:1px solid var(--olbr);border-radius:10px;padding:16px"><div class="lbl" style="color:var(--ol)">DESIGN BRIEF</div>';
  html+='<div class="grid-2" style="margin-bottom:14px">';
  html+='<div><div class="lbl">Best Colours</div><div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">';
  (d.sellThisNow?.colourHexes||['#7C9A7E','#F5F0E8','#1A1A1A']).forEach(function(hex,i){html+='<div style="display:flex;flex-direction:column;align-items:center;gap:3px"><div style="width:36px;height:36px;border-radius:7px;background:'+hex+';border:1px solid rgba(0,0,0,.1)"></div><span style="font-size:9px;color:var(--mu);font-family:DM Mono,monospace">'+hex+'</span></div>';});
  html+='</div><div class="lbl">Font Style</div><div style="font-weight:700;color:var(--ol);font-size:16px;margin-bottom:4px">'+d.sellThisNow?.bestFontStyle+'</div><div style="font-size:12px;color:var(--mu)">'+d.sellThisNow?.fontReason+'</div></div>';
  html+='<div><div class="lbl">Design Style</div><div style="font-weight:700;color:var(--gd);font-size:16px;margin-bottom:4px">'+d.sellThisNow?.bestDesignStyle+'</div><div style="font-size:12px;color:var(--mu);margin-bottom:12px">'+d.sellThisNow?.designReason+'</div>';
  html+='<div class="lbl">Key Phrase</div><div style="font-family:Cormorant Garamond,serif;font-size:20px;font-style:italic;color:var(--gd);font-weight:600">"'+d.sellThisNow?.bestPhrase+'"</div><div style="font-size:11px;color:var(--mu);margin-top:3px">'+d.sellThisNow?.phraseEmotion+'</div></div></div>';
  html+='<div style="background:var(--w);border:1px solid var(--b1);border-radius:8px;padding:12px"><div class="lbl">Full Design Instructions</div><p style="font-size:13px;line-height:1.7">'+d.sellThisNow?.designBrief+'</p><div style="margin-top:8px"><span class="badge b-grey">Image Style: '+d.sellThisNow?.imageStyle+'</span></div></div></div></div>';

  // VISUAL INTELLIGENCE
  html+='<div class="card d2"><div class="lbl">Visual Intelligence — What Actually Sells</div>';
  html+='<div class="grid-2"><div><div class="lbl">Top Colours in Bestsellers</div>';

function copyTags(){var t=(window._oppData?.topTags||[]).join(', ');var btn=document.getElementById('copy-tags-btn');copyText(t,btn);}
async function saveOpp(niche,verdict){try{var status=verdict.includes('BUY IN')?'launch':verdict.includes('TESTING')?'test':'watch';var s=getSession();await dbInsert('workspace',{niche,status,owner_id:s.userId,created_at:new Date().toISOString()});alert('Saved to Workspace!');}catch(e){alert('Could not save: '+e.message);}}
function exportOpp(){if(!window._oppData)return;var d=window._oppData;csvExport([{Keyword:window._oppKw,Score:d.opportunityScore,Verdict:d.verdict,Demand:d.demandScore,Competition:d.competitionScore,Platform:d.sellThisNow?.platform,'UK Price':d.sellThisNow?.ukPrice,Margin:d.sellThisNow?.margin,Tags:(d.topTags||[]).join(', ')}],'opportunity-'+window._oppKw+'.csv');}
function exportListings(){if(!window._etsyL||!window._etsyL.length)return;csvExport(window._etsyL.map(function(l){return{Title:l.title,Price:'£'+((l.price?.amount||0)/100).toFixed(2),Favorites:l.num_favorers||0,Shop:l.shop?.shop_name||'',Tags:(l.tags||[]).join(', '),URL:l.url||''};}), 'listings-'+window._oppKw+'.csv');}

if(urlKw) setTimeout(doOpportunity,400);
</script>
